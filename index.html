<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendy the Cow · Lost Passion</title>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f1f1f1;  /* W3Schools light gray background */
            color: #282A35;  /* W3Schools dark blue-gray for text */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 260px 1fr 240px;
            width: 100vw;
            max-width: 1400px;
            height: 100vh;
            align-items: center;
        }

        /* --- LEFT SIDEBAR with W3Schools green accent --- */
        .left-nav {
            padding: 2rem 2rem 2rem 2.5rem;
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 2.8;
            border-right: 2px solid #04AA6D;  /* W3Schools green */
            height: fit-content;
            color: #282A35;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            padding: 0.2rem 0;
            font-family: 'Segoe UI', sans-serif;
        }

        .nav-item i {
            font-size: 1.5rem;
            color: #04AA6D;  /* W3Schools green for icons */
            transition: 0.2s;
            width: 32px;
            display: inline-flex;
            justify-content: center;
        }

        .nav-item:hover {
            color: #04AA6D;
            transform: translateX(8px);
        }

        .nav-item:hover i {
            color: #059862;  /* darker green on hover */
            transform: scale(1.1);
        }

        /* --- CENTER STAGE --- */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            height: 100%;
            position: relative;
        }

        /* Avatar container with larger green splash behind it */
        .avatar-wrapper {
            position: relative;
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Bigger green splash shape (increased size) */
        .green-splash {
            position: absolute;
            width: 400px;  /* Increased from 320px */
            height: 400px; /* Increased from 320px */
            background: linear-gradient(135deg, #04AA6D 0%, #059862 100%); /* W3Schools green gradient */
            border-radius: 42% 58% 70% 30% / 40% 50% 50% 60%;
            animation: morph 10s ease-in-out infinite;
            opacity: 0.25; /* More subtle to match W3Schools clean style */
            z-index: 1;
            filter: blur(2px); /* Soft blur for that "splash" effect */
        }

        @keyframes morph {
            0%, 100% {
                border-radius: 42% 58% 70% 30% / 40% 50% 50% 60%;
            }
            25% {
                border-radius: 55% 45% 35% 65% / 50% 40% 60% 50%;
            }
            50% {
                border-radius: 60% 40% 30% 70% / 50% 60% 40% 50%;
            }
            75% {
                border-radius: 35% 65% 55% 45% / 40% 50% 50% 60%;
            }
        }

        .cow-avatar-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #04AA6D;  /* W3Schools green border */
            box-shadow: 0 15px 30px -8px rgba(4, 170, 109, 0.3);
            overflow: hidden;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .cow-avatar-container:hover {
            transform: scale(1.02);
            border-color: #059862;
        }

        .cow-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
        }

        .mendy-name {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #282A35;  /* W3Schools dark text */
            line-height: 1.1;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            z-index: 2;
        }

        .mendy-name i {
            font-size: 3rem;
            color: #04AA6D;
            opacity: 0.8;
        }

        .mendy-name span {
            color: #059862;
            font-style: italic;
            font-weight: 600;
        }

        .description {
            max-width: 500px;
            font-size: 1.3rem;
            color: #282A35;
            background: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: 2px solid #04AA6D;
            margin: 1rem 0 2rem 0;
            box-shadow: 0 6px 0 #e7e9f2;  /* W3Schools light shadow */
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
            z-index: 2;
        }

        .description i {
            font-size: 1.4rem;
            color: #04AA6D;
        }

        .passion-button {
            background: #04AA6D;  /* W3Schools "Try it Yourself" green */
            color: white;
            border: none;
            padding: 1rem 3.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #059862;
            transition: 0.1s linear;
            letter-spacing: 1px;
            border: 2px solid #059862;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            z-index: 2;
        }

        .passion-button i {
            font-size: 1.6rem;
        }

        .passion-button:hover {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #035f44;
            background: #059862;
        }

        /* --- RIGHT SIDEBAR with W3Schools style --- */
        .right-whitespace {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            height: 100%;
            padding: 2rem;
            border-left: 2px solid #04AA6D;
            color: #282A35;
            font-size: 1.1rem;
            text-align: right;
            gap: 15px;
        }

        .mood-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-style: italic;
        }

        .mood-item i {
            font-size: 1.3rem;
            color: #04AA6D;
            order: 1;
        }

        .xhs-handle {
            background: white;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            border: 1px dashed #04AA6D;
            margin-top: 1.5rem;
            font-style: normal;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .xhs-handle i {
            font-size: 1.2rem;
            color: #04AA6D;
        }

        .signature {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.85rem;
            color: #282A35;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.7;
        }

        .signature i {
            font-size: 0.9rem;
            color: #04AA6D;
        }

        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 200px 1fr 140px;
            }
            .left-nav { font-size: 1.1rem; padding: 1.5rem; }
            .mendy-name { font-size: 2.5rem; }
            .cow-avatar-container { width: 200px; height: 200px; }
            .green-splash { width: 300px; height: 300px; }
        }
    </style>
</head>
<body>

<div class="main-grid">
    <!-- LEFT: navigation with W3Schools style -->
    <nav class="left-nav">
        <div class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-flask"></i>
            <span>Lab</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-book"></i>
            <span>Notes</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-gamepad"></i>
            <span>Games</span>
        </div>
        <div class="nav-item">
            <i class="fas fa-info-circle"></i>
            <span>About</span>
        </div>
    </nav>

    <!-- CENTER: Mendy the Cow with larger green splash -->
    <div class="center-stage">
        <div class="avatar-wrapper">
            <!-- Bigger green splash shape behind avatar -->
            <div class="green-splash"></div>
            <div class="cow-avatar-container">
                <img src="cow.jpg" alt="Mendy the Cow" class="cow-avatar">
            </div>
        </div>
        <div class="mendy-name">
            <i class="fas fa-cow"></i>
            MENDY <span>THE COW</span>
        </div>
        <div class="description">
            <i class="fas fa-frown"></i>
            that has lost her passion
            <i class="fas fa-cloud-sun"></i>
        </div>
        <button class="passion-button" onclick="alert('🐄 Moo! Maybe she found it on W3Schools...')">
            <i class="fas fa-search"></i>
            find her passion
            <i class="fas fa-heart"></i>
        </button>
    </div>

    <!-- RIGHT: with W3Schools style -->
    <div class="right-whitespace">
        <div class="mood-item">
            <span>lost & wandering</span>
            <i class="fas fa-cloud-wind"></i>
        </div>
        <div class="mood-item">
            <span>looking for purpose</span>
            <i class="fas fa-compass"></i>
        </div>
      
    </div>
</div>

<div class="signature">
    <i class="fas fa-pen"></i>
  MOoooMOoooOO
    <i class="fas fa-check-circle"></i>
</div>

</body>
</html>
