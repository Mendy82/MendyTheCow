<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendy the Cow · Lost Passion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fefae0;  /* soft creamy background */
            color: #283618;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;      /* no scrolling */
        }

        .main-grid {
            display: grid;
            grid-template-columns: 240px 1fr 240px;  /* left | center | right (empty) */
            width: 100vw;
            max-width: 1280px;
            height: 100vh;
            align-items: center;
        }

        /* --- LEFT SIDEBAR (nav) --- */
        .left-nav {
            padding: 2rem;
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 2.2;
            border-right: 2px dashed #bc6c25;
            height: fit-content;
        }

        .left-nav div {
            cursor: default;
            transition: 0.2s;
            color: #606c38;
            font-family: 'Courier New', monospace;
        }

        .left-nav div:hover {
            color: #bc6c25;
            transform: translateX(6px);
        }

        /* --- CENTER STAGE (Mendy) --- */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            height: 100%;
        }

        .cow-avatar {
            font-size: 8rem;
            filter: drop-shadow(6px 8px 0 #d4a373);
            margin-bottom: 0.5rem;
            animation: softBounce 4s infinite ease-in-out;
        }

        @keyframes softBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .mendy-name {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #283618;
            line-height: 1.1;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .mendy-name span {
            color: #bc6c25;
            font-style: italic;
        }

        .description {
            max-width: 500px;
            font-size: 1.3rem;
            color: #5f5f5f;
            background: #fbf8e9;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            border: 2px solid #bc6c25;
            margin: 1.2rem 0 1.8rem 0;
            box-shadow: 4px 4px 0 #a7b09e;
            font-weight: 500;
        }

        .hire-button {
            background: #283618;
            color: #fefae0;
            border: none;
            padding: 1rem 3.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 6px 6px 0 #bc6c25;
            transition: 0.1s linear;
            letter-spacing: 1px;
            border: 2px solid #bc6c25;
            text-transform: uppercase;
        }

        .hire-button:hover {
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 #bc6c25;
            background: #1f2a44;
        }

        /* --- tiny signature / easter egg (right sidebar unused but clean) --- */
        .right-whitespace {
            display: flex;
            justify-content: flex-end;
            align-items: flex-start;
            height: 100%;
            padding: 2rem;
            font-size: 1rem;
            color: #bc6c25;
            font-style: italic;
            border-left: 2px dashed #bc6c25;
            opacity: 0.7;
            text-align: right;
        }

        /* optional responsive: if screen too small, collapse gracefully */
        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 140px 1fr 80px;
            }
            .left-nav { font-size: 1.1rem; padding: 1rem; }
            .mendy-name { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="main-grid">
    <!-- LEFT: navigation -->
    <nav class="left-nav">
        <div>🏠 Home</div>
        <div>🧪 Lab</div>
        <div>📓 Notes</div>
        <div>🎮 Games</div>
        <div>📌 About</div>
    </nav>

    <!-- CENTER: Mendy the Cow -->
    <div class="center-stage">
        <div class="cow-avatar">🐄</div>
        <div class="mendy-name">MENDY <span>THE COW</span></div>
        <div class="description">that has lost her passion</div>
        <!-- "Hire Me" becomes "pet me" or "follow her" — but keeping original style -->
        <button class="hire-button" onclick="alert('🐄 Moo? Mendy appreciates you.')">pet her</button>
    </div>

    <!-- RIGHT: (empty space, just a little cow quote) -->
    <div class="right-whitespace">
        “no milk,<br> only vibes.”
    </div>
</div>

<!-- subtle extra: if you want to include your name / designer credit small -->
<div style="position: fixed; bottom: 8px; right: 14px; font-size: 0.8rem; color: #a7b09e;">
    ✦ MUHAMMAD HUSNAIN ✦
</div>

</body>
</html>
