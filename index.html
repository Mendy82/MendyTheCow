<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendy the Cow · Lost Passion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;  /* clean white background */
            color: #2c3e2f;        /* deep green for text */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;      /* no scrolling */
        }

        .main-grid {
            display: grid;
            grid-template-columns: 240px 1fr 240px;  /* left | center | right (empty) */
            width: 100vw;
            max-width: 1280px;
            height: 100vh;
            align-items: center;
        }

        /* --- LEFT SIDEBAR (nav) - clean green --- */
        .left-nav {
            padding: 2rem;
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 2.4;
            border-right: 2px solid #b7d6b3;  /* soft green border */
            height: fit-content;
            color: #3a5e3d;        /* forest green */
        }

        .left-nav div {
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
            position: relative;
            padding-left: 0;
        }

        .left-nav div:hover {
            color: #1f3b22;         /* darker green */
            transform: translateX(8px);
        }

        .left-nav div::before {
            content: "🌿";
            opacity: 0;
            margin-right: 8px;
            transition: 0.2s;
        }

        .left-nav div:hover::before {
            opacity: 1;
        }

        /* --- CENTER STAGE (Mendy) --- */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            height: 100%;
        }

        /* Cow avatar container */
        .cow-avatar-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: #f0f7ed;        /* very light green background */
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            border: 4px solid #b7d6b3;  /* soft green border */
            box-shadow: 0 15px 25px -8px rgba(58, 94, 61, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .cow-avatar-container:hover {
            transform: scale(1.02);
        }

        .cow-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;  /* adjust to show face better */
            display: block;
        }

        .mendy-name {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #1f3b22;              /* deep forest green */
            line-height: 1.1;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        .mendy-name span {
            color: #5f8b4b;              /* medium green */
            font-style: italic;
            font-weight: 600;
        }

        .description {
            max-width: 500px;
            font-size: 1.3rem;
            color: #4a6741;                /* sage green */
            background: #f8fff5;            /* off-white with green tint */
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: 2px solid #b7d6b3;
            margin: 1.2rem 0 1.8rem 0;
            box-shadow: 0 6px 0 #d0e3cc;    /* subtle green shadow */
            font-weight: 500;
        }

        .passion-button {
            background: #2c5e2e;            /* vibrant green */
            color: white;
            border: none;
            padding: 1rem 3.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a3b1c;    /* darker green shadow */
            transition: 0.1s linear;
            letter-spacing: 1px;
            border: 2px solid #b7d6b3;
            text-transform: uppercase;
        }

        .passion-button:hover {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1a3b1c;
            background: #1f4b21;
        }

        /* --- right side - small green accent --- */
        .right-whitespace {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            height: 100%;
            padding: 2rem;
            border-left: 2px solid #b7d6b3;
            color: #5f8b4b;
            font-size: 1.1rem;
            text-align: right;
            font-style: italic;
        }

        .xhs-handle {
            background: #f0f7ed;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px dashed #8fb389;
            margin-top: 1rem;
            font-style: normal;
            font-family: monospace;
        }

        /* footer credit */
        .signature {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.85rem;
            color: #b7d6b3;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* responsive adjustment */
        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 140px 1fr 100px;
            }
            .left-nav { font-size: 1.1rem; padding: 1rem; }
            .mendy-name { font-size: 2.5rem; }
            .cow-avatar-container { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

<div class="main-grid">
    <!-- LEFT: navigation - clean white/green -->
    <nav class="left-nav">
        <div>🏠 Home</div>
        <div>🧪 Lab</div>
        <div>📓 Notes</div>
        <div>🎮 Games</div>
        <div>📌 About</div>
    </nav>

    <!-- CENTER: Mendy the Cow with your actual avatar -->
    <div class="center-stage">
        <div class="cow-avatar-container">
            <!-- Using your cow image - replace "cow.jpg" with your actual filename -->
            <img src="cow.jpg" alt="Mendy the Cow" class="cow-avatar">
        </div>
        <div class="mendy-name">MENDY <span>THE COW</span></div>
        <div class="description">that has lost her passion</div>
        <button class="passion-button" onclick="alert('🐄 Moo? Maybe she found it...')">find her passion</button>
    </div>

    <!-- RIGHT: space with xiaohongshu handle from your image -->
    <div class="right-whitespace">
        <div>lost &</div>
        <div>wandering</div>
        <div class="xhs-handle">
            🌿 小红书号: 94170383890
        </div>
    </div>
</div>

<div class="signature">
    ✦ MUHAMMAD HUSNAIN ✦
</div>

</body>
</html>
