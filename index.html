<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendy the Cow · Lost Passion</title>
    <!-- UNIcons CDN -->
    <link rel="stylesheet" href="https://cdn.unicons.io/css/unicons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #ffffff;
            color: #2c3e2f;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 260px 1fr 240px;
            width: 100vw;
            max-width: 1400px;
            height: 100vh;
            align-items: center;
        }

        /* --- LEFT SIDEBAR with UNIcons --- */
        .left-nav {
            padding: 2rem 2rem 2rem 2.5rem;
            font-size: 1.3rem;
            font-weight: 500;
            line-height: 2.8;
            border-right: 2px solid #b7d6b3;
            height: fit-content;
            color: #3a5e3d;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            padding: 0.2rem 0;
            font-family: 'Inter', sans-serif;
        }

        .nav-item i {
            font-size: 1.5rem;
            color: #5f8b4b;
            transition: 0.2s;
            width: 32px;
            display: inline-flex;
            justify-content: center;
        }

        .nav-item:hover {
            color: #1f3b22;
            transform: translateX(8px);
        }

        .nav-item:hover i {
            color: #2c5e2e;
            transform: scale(1.1);
        }

        /* --- CENTER STAGE --- */
        .center-stage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1rem;
            height: 100%;
        }

        .cow-avatar-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: #f0f7ed;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
            border: 4px solid #b7d6b3;
            box-shadow: 0 15px 30px -8px rgba(58, 94, 61, 0.15);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .cow-avatar-container:hover {
            transform: scale(1.02);
        }

        .cow-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
        }

        .mendy-name {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #1f3b22;
            line-height: 1.1;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .mendy-name i {
            font-size: 3rem;
            color: #b7d6b3;
            opacity: 0.6;
        }

        .mendy-name span {
            color: #5f8b4b;
            font-style: italic;
            font-weight: 600;
        }

        .description {
            max-width: 500px;
            font-size: 1.3rem;
            color: #4a6741;
            background: #f8fff5;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            border: 2px solid #b7d6b3;
            margin: 1rem 0 2rem 0;
            box-shadow: 0 6px 0 #d0e3cc;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .description i {
            font-size: 1.4rem;
            color: #8fb389;
        }

        .passion-button {
            background: #2c5e2e;
            color: white;
            border: none;
            padding: 1rem 3.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #1a3b1c;
            transition: 0.1s linear;
            letter-spacing: 1px;
            border: 2px solid #b7d6b3;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .passion-button i {
            font-size: 1.6rem;
        }

        .passion-button:hover {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #1a3b1c;
            background: #1f4b21;
        }

        /* --- RIGHT SIDEBAR with icons --- */
        .right-whitespace {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            height: 100%;
            padding: 2rem;
            border-left: 2px solid #b7d6b3;
            color: #5f8b4b;
            font-size: 1.1rem;
            text-align: right;
            gap: 15px;
        }

        .mood-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-style: italic;
        }

        .mood-item i {
            font-size: 1.3rem;
            color: #8fb389;
            order: 1;  /* moves icon to the right since text-align is right */
        }

        .xhs-handle {
            background: #f0f7ed;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-size: 0.95rem;
            border: 1px dashed #8fb389;
            margin-top: 1.5rem;
            font-style: normal;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .xhs-handle i {
            font-size: 1.2rem;
            color: #e4405f;  /* xiaohongshu pink/red accent */
        }

        .signature {
            position: fixed;
            bottom: 12px;
            right: 20px;
            font-size: 0.85rem;
            color: #b7d6b3;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .signature i {
            font-size: 0.9rem;
            color: #8fb389;
        }

        @media (max-width: 800px) {
            .main-grid {
                grid-template-columns: 200px 1fr 140px;
            }
            .left-nav { font-size: 1.1rem; padding: 1.5rem; }
            .mendy-name { font-size: 2.5rem; }
            .cow-avatar-container { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

<div class="main-grid">
    <!-- LEFT: navigation with UNIcons -->
    <nav class="left-nav">
        <div class="nav-item">
            <i class="uil uil-estate"></i>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <i class="uil uil-flask"></i>
            <span>Lab</span>
        </div>
        <div class="nav-item">
            <i class="uil uil-notes"></i>
            <span>Notes</span>
        </div>
        <div class="nav-item">
            <i class="uil uil-game-structure"></i>
            <span>Games</span>
        </div>
        <div class="nav-item">
            <i class="uil uil-info-circle"></i>
            <span>About</span>
        </div>
    </nav>

    <!-- CENTER: Mendy the Cow -->
    <div class="center-stage">
        <div class="cow-avatar-container">
            <img src="cow.jpg" alt="Mendy the Cow" class="cow-avatar">
        </div>
        <div class="mendy-name">
            <i class="uil uil-cow"></i>
            MENDY <span>THE COW</span>
        </div>
        <div class="description">
            <i class="uil uil-frown"></i>
            that has lost her passion
            <i class="uil uil-cloud-sun"></i>
        </div>
        <button class="passion-button" onclick="alert('🐄 Maybe she found it...')">
            <i class="uil uil-search"></i>
            find her passion
            <i class="uil uil-heart"></i>
        </button>
    </div>

    <!-- RIGHT: with UNIcons -->
    <div class="right-whitespace">
        <div class="mood-item">
            <span>lost & wandering</span>
            <i class="uil uil-cloud-wind"></i>
        </div>
        <div class="mood-item">
            <span>looking for purpose</span>
            <i class="uil uil-compass"></i>
        </div>
        <div class="xhs-handle">
            <i class="uil uil-camera"></i>
            小红书号: 94170383890
        </div>
    </div>
</div>

<div class="signature">
    <i class="uil uil-pen"></i>
    MUHAMMAD HUSNAIN
    <i class="uil uil-check-circle"></i>
</div>

</body>
</html>
